<!-- 主体内容 -->
<main class="container page">
    <div class="page-header">
        <h1 class="page-title">自定义算法</h1>
        <p class="page-desc">在线编写、运行和调试算法代码，支持多语言</p>
    </div>

    <!-- 代码编辑器区域 -->
    <div class="code-editor-container">
        <div class="editor-header">
            <select id="languageSelect" class="language-select">
                <option value="python">Python</option>
                <option value="javascript">JavaScript</option>
                <option value="c">C</option>
                <option value="java">Java</option>
            </select>
            <div class="editor-toolbar">
                <button class="toolbar-btn" title="保存代码" id="saveBtn">💾 保存</button>
                <button class="toolbar-btn" title="格式化代码">🔧 格式化</button>
                <button class="toolbar-btn" title="全屏编辑">⛶ 全屏</button>
            </div>
        </div>
        <textarea id="codeEditor" class="code-editor"></textarea>
    </div>

    <!-- 控制按钮 -->
    <div class="btn-group">
        <button id="runBtn" class="btn btn-primary">▶️ 运行代码</button>
        <button id="resetBtn" class="btn btn-outline">🔄 重置代码</button>
        <button class="btn btn-outline">🐞 调试模式</button>
    </div>

    <!-- 输入输出区域 -->
    <div class="run-result">
        <div class="input-panel">
            <label class="panel-label">输入测试用例</label>
            <textarea id="inputArea" class="input-area" placeholder="请输入测试用例，多个输入用换行分隔..."></textarea>
        </div>
        <div class="output-panel">
            <label class="panel-label">运行结果</label>
            <div id="outputArea" class="output-area"></div>
        </div>
    </div>
</main>
